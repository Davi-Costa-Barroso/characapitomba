<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#1a2417"/>
    </linearGradient>
  </defs>
  
  <!-- Fundo arredondado -->
  <rect width="100" height="100" rx="20" fill="#f2f7f2"/>
  
  <!-- Folha -->
  <path d="M70 20 C50 20, 30 40, 30 60 C30 75, 45 85, 60 80 C75 75, 85 55, 70 20 Z" 
        fill="url(#leafGradient)"/>
  
  <!-- Veia da folha -->
  <path d="M35 60 C50 55, 65 45, 75 30" 
        stroke="#ffffff" 
        stroke-width="3" 
        fill="none" 
        stroke-linecap="round"/>
</svg>